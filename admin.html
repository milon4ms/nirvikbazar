<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অ্যাডমিন প্যানেল - নির্বিক বাজার</title>
    <link rel="stylesheet" href="admin-styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="admin-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>নির্বিক অ্যাডমিন</h2>
            </div>
            <ul class="sidebar-menu">
                <li class="active" onclick="showSection('dashboard')"><i class="fa fa-tachometer-alt"></i> ড্যাশবোর্ড</li>
                <li onclick="showSection('orders')"><i class="fa fa-shopping-bag"></i> অর্ডারসমূহ</li>
                <li onclick="showSection('inventory')"><i class="fa fa-boxes"></i> ইনভেন্টরি</li>
                <li><a href="index.html" style="color: white; text-decoration: none;"><i class="fa fa-eye"></i> সাইট দেখুন</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <section id="dashboard" class="admin-section">
                <h1 class="page-title">ড্যাশবোর্ড সামারি</h1>
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>মোট অর্ডার</h3>
                        <p id="total-orders">০</p>
                    </div>
                    <div class="stat-card">
                        <h3>মোট বিক্রি</h3>
                        <p id="total-sales">৳০</p>
                    </div>
                    <div class="stat-card">
                        <h3>স্টক পণ্য</h3>
                        <p id="total-stock">১৬</p>
                    </div>
                </div>
            </section>

            <section id="orders" class="admin-section" style="display: none;">
                <h1 class="page-title">সাম্প্রতিক অর্ডারসমূহ</h1>
                <div class="table-container">
                    <table id="orders-table">
                        <thead>
                            <tr>
                                <th>অর্ডার আইডি</th>
                                <th>ক্রেতার নাম</th>
                                <th>মোবাইল</th>
                                <th>মোট টাকা</th>
                                <th>স্ট্যাটাস</th>
                                <th>অ্যাকশন</th>
                            </tr>
                        </thead>
                        <tbody id="orders-body">
                            </tbody>
                    </table>
                </div>
            </section>

            <section id="inventory" class="admin-section" style="display: none;">
                <h1 class="page-title">পণ্য ও স্টক ম্যানেজমেন্ট</h1>
                <div class="table-container">
                    <table id="stock-table">
                        <thead>
                            <tr>
                                <th>পণ্যের নাম</th>
                                <th>ক্যাটাগরি</th>
                                <th>দাম</th>
                                <th>বর্তমান স্টক</th>
                                <th>আপডেট</th>
                            </tr>
                        </thead>
                        <tbody id="stock-body">
                            </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script src="admin-script.js"></script>
</body>
</html>
