<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>চেকআউট - নির্বিক বাজার</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .checkout-container { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-top: 40px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; }
        .order-summary { background: #fff; padding: 20px; border-radius: 10px; box-shadow: var(--shadow); }
        .summary-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .total-row { font-size: 20px; color: var(--primary-green); font-weight: bold; }
        .qty-controls button { width: 30px; height: 30px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="text-align: center; margin-top: 30px;">চেকআউট ফরম</h1>
        <div class="checkout-container">
            <div class="delivery-info">
                <form id="orderForm">
                    <div class="form-group">
                        <label>নাম (আবশ্যিক):</label>
                        <input type="text" id="custName" required placeholder="আপনার পুরো নাম">
                    </div>
                    <div class="form-group">
                        <label>মোবাইল নম্বর (১১ সংখ্যা):</label>
                        <input type="text" id="custMobile" required maxlength="11" placeholder="যেমন: 01700000000">
                    </div>
                    <div class="form-group">
                        <label>ঠিকানা (আবশ্যিক):</label>
                        <textarea id="custAddress" required rows="4" placeholder="আপনার বিস্তারিত ঠিকানা"></textarea>
                    </div>
                    <p><strong>পেমেন্ট মেথড:</strong> ক্যাশ অন ডেলিভারি (COD)</p>
                    <button type="submit" class="btn" style="width: 100%; font-size: 18px;">অর্ডার কনফার্ম করুন</button>
                </form>
            </div>

            <div class="order-summary">
                <h3>অর্ডার সামারি</h3>
                <div id="summary-items">
                    </div>
                <div class="summary-row">
                    <span>সাব-টোটাল:</span>
                    <span id="subtotal">৳০</span>
                </div>
                <div class="summary-row">
                    <span>কুরিয়ার খরচ:</span>
                    <span id="shipping">৳৮০</span>
                </div>
                <div class="summary-row total-row">
                    <span>সর্বমোট:</span>
                    <span id="grandtotal">৳০</span>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Checkout page logic
        document.addEventListener('DOMContentLoaded', updateCheckoutSummary);

        document.getElementById('orderForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const mobile = document.getElementById('custMobile').value;
            if(!/^[0-9]{11}$/.test(mobile)) {
                alert("ভুল নম্বর! দয়া করে ১১ সংখ্যার সঠিক মোবাইল নম্বর দিন।");
                return;
            }
            alert("ধন্যবাদ! আপনার অর্ডারটি গ্রহণ করা হয়েছে।");
            localStorage.clear();
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
