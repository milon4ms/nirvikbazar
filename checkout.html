<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>চেকআউট - নির্বিক বাজার</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --primary: #00a651; --secondary: #e67e22; --dark: #333; --light: #f9f9f9; --white: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Hind Siliguri', sans-serif; }
        body { background: var(--light); padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .checkout-title { text-align: center; margin-bottom: 30px; font-size: 28px; color: var(--dark); }
        
        .checkout-flex { display: flex; flex-wrap: wrap; gap: 20px; }
        .billing-form { flex: 1; min-width: 300px; background: var(--white); padding: 25px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .order-summary { width: 380px; background: var(--white); padding: 25px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); height: fit-content; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; outline: none; font-size: 15px; }
        
        .cart-item-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px dashed #ddd; }
        .qty-control { display: flex; align-items: center; gap: 8px; margin-top: 5px; }
        .qty-btn { width: 25px; height: 25px; border: 1px solid var(--primary); background: white; color: var(--primary); cursor: pointer; border-radius: 3px; font-weight: bold; }
        .qty-btn:hover { background: var(--primary); color: white; }
        .qty-val { font-weight: bold; min-width: 20px; text-align: center; }

        .summary-item { display: flex; justify-content: space-between; margin-bottom: 12px; }
        .summary-item.total { border-top: 2px solid #eee; padding-top: 15px; color: var(--primary); font-size: 22px; font-weight: 700; }
        
        .order-btn { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 5px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .order-btn:hover { background: #008541; }
        .order-btn:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="checkout-title">চেকআউট ফরম</h1>
        
        <form id="checkoutForm" class="checkout-flex">
            <div class="billing-form">
                <div class="form-group">
                    <label>নাম (আবশ্যক):</label>
                    <input type="text" id="name" placeholder="আপনার পুরো নাম লিখুন" required>
                </div>
                <div class="form-group">
                    <label>মোবাইল নম্বর:</label>
                    <input type="text" id="phone" placeholder="যেমন: 017XXXXXXXX" required>
                </div>
                
                <div class="form-group">
                    <label>শিপিং এরিয়া (সিলেক্ট করুন):</label>
                    <select id="shippingArea" onchange="renderCart()">
                        <option value="60">ঢাকার ভেতরে (৬০ টাকা)</option>
                        <option value="120">ঢাকার বাইরে (১২০ টাকা)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>ঠিকানা (আবশ্যক):</label>
                    <textarea id="address" rows="3" placeholder="বাসা নং, রোড, থানা, জেলা" required></textarea>
                </div>
                <p style="font-size: 14px; color: #444; background: #f0fdf4; padding: 10px; border-radius: 5px; border-left: 4px solid var(--primary);">
                    <strong>পেমেন্ট মেথড:</strong> ক্যাশ অন ডেলিভারি (COD)
                </p>
            </div>

            <div class="order-summary">
                <h3 style="margin-bottom: 20px; border-bottom: 2px solid var(--primary); padding-bottom: 5px;">অর্ডার সামারি</h3>
                
                <div id="cart-items-list"></div>
                
                <div class="summary-item" style="margin-top: 20px;">
                    <span>সাব-টোটাল:</span>
                    <span id="subtotal">৳০</span>
                </div>
                <div class="summary-item">
                    <span>কুরিয়ার খরচ:</span>
                    <span id="shippingDisplay">৳৬০</span>
                </div>
                <div class="summary-item total">
                    <span>সর্বমোট:</span>
                    <span id="totalDisplay">৳০</span>
                </div>
                
               <button type="submit" class="order-btn" id="submitBtn">অর্ডার কনফার্ম করুন</button>

                <div style="text-align: center; margin-top: 15px;">
                    <a href="index.html" style="color: var(--secondary); text-decoration: none; font-weight: 600; font-size: 15px; display: flex; align-items: center; justify-content: center; gap: 8px;">
                        <i class="fas fa-plus-circle"></i> আরও পণ্য যোগ করুন
                    </a>
                </div>
            </div>
        </form>
    </div>

    <script>
        // টেলিগ্রাম কনফিগারেশন (Safe Mode)
        const _t1 = '8575434705';
        const _t2 = 'AAHtEGHvWGcmhD6AkbshhzTD1wpVwXasksM';
        const TELEGRAM_BOT_TOKEN = `${_t1}:${_t2}`;
        const TELEGRAM_CHAT_ID = '2007567611';

        let cart = JSON.parse(localStorage.getItem('cart')) || [];

        function bnToEnNumber(str) {
            const banglaNums = {'০': '0', '১': '1', '২': '2', '৩': '3', '৪': '4', '৫': '5', '৬': '6', '৭': '7', '৮': '8', '৯': '9'};
            return str.replace(/[০-৯]/g, s => banglaNums[s]);
        }

        function renderCart() {
            const listDiv = document.getElementById('cart-items-list');
            const subtotalEl = document.getElementById('subtotal');
            const totalDisplay = document.getElementById('totalDisplay');
            const shippingCost = parseInt(document.getElementById('shippingArea').value);
            const submitBtn = document.getElementById('submitBtn');
            
            let currentSubtotal = 0;
            listDiv.innerHTML = '';

            if (cart.length === 0) {
                listDiv.innerHTML = '<p style="color:red; text-align:center;">কার্ট খালি!</p>';
                submitBtn.disabled = true;
                subtotalEl.innerText = '৳০';
                totalDisplay.innerText = '৳০';
                return;
            }

            cart.forEach((item, index) => {
                const itemTotal = item.price * item.quantity;
                currentSubtotal += itemTotal;

                listDiv.innerHTML += `
                    <div class="cart-item-row">
                        <div>
                            <div style="font-weight:600;">${item.name}</div>
                            <div class="qty-control">
                                <button type="button" class="qty-btn" onclick="updateQty(${index}, -1)">-</button>
                                <span class="qty-val">${item.quantity}</span>
                                <button type="button" class="qty-btn" onclick="updateQty(${index}, 1)">+</button>
                            </div>
                        </div>
                        <div style="font-weight:700;">৳${itemTotal}</div>
                    </div>
                `;
            });

            subtotalEl.innerText = '৳' + currentSubtotal;
            document.getElementById('shippingDisplay').innerText = '৳' + shippingCost;
            totalDisplay.innerText = '৳' + (currentSubtotal + shippingCost);
            
            localStorage.setItem('cart', JSON.stringify(cart));
        }

        function updateQty(index, change) {
            cart[index].quantity += change;
            if (cart[index].quantity < 1) {
                if(confirm("আপনি কি পণ্যটি কার্ট থেকে বাদ দিতে চান?")) {
                    cart.splice(index, 1);
                } else {
                    cart[index].quantity = 1;
                }
            }
            renderCart();
        }

        async function sendOrderToTelegram(orderData) {
            const message = `
📦 **নতুন অর্ডার এসেছে!**
--------------------------
👤 নাম: ${orderData.name}
📞 ফোন: ${orderData.phone}
🏠 ঠিকানা: ${orderData.address}
🚚 শিপিং: ${orderData.shipping}
--------------------------
🛒 পণ্যসমূহ:
${orderData.items.map(item => `- ${item.name} (${item.quantity}টি) - ৳${item.price * item.quantity}`).join('\n')}
--------------------------
💰 **সর্বমোট বিল: ${orderData.total}**
            `;

            try {
                await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: TELEGRAM_CHAT_ID,
                        text: message,
                        parse_mode: 'Markdown'
                    })
                });
            } catch (error) {
                console.error("Telegram Error:", error);
            }
        }

        document.getElementById('checkoutForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const rawPhone = document.getElementById('phone').value;
            const cleanPhone = bnToEnNumber(rawPhone).replace(/\s/g, '');

            if (cleanPhone.length < 11) {
                alert("সঠিক মোবাইল নম্বর দিন!");
                return;
            }

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerText = "অর্ডার হচ্ছে...";

            const orderData = {
                name: document.getElementById('name').value,
                phone: cleanPhone,
                address: document.getElementById('address').value,
                shipping: document.getElementById('shippingArea').options[document.getElementById('shippingArea').selectedIndex].text,
                items: cart,
                total: document.getElementById('totalDisplay').innerText
            };

            // অর্ডার টেলিগ্রামে পাঠানো হচ্ছে
            await sendOrderToTelegram(orderData);

            localStorage.removeItem('cart'); 
            
            setTimeout(() => {
                window.location.href = 'thank-you.html';
            }, 500);
        });

        document.addEventListener('DOMContentLoaded', renderCart);
    </script>
</body>
</html>
