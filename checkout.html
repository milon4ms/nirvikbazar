<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>চেকআউট - নির্বিক বাজার</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .checkout-container { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-top: 40px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; }
        .order-summary { background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .summary-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .total-row { font-size: 20px; color: #27ae60; font-weight: bold; border-top: 2px solid #eee; margin-top: 10px; }
        
        /* মোবাইল রেসপন্সিভ */
        @media (max-width: 768px) {
            .checkout-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="text-align: center; margin-top: 30px;">চেকআউট ফরম</h1>
        <div class="checkout-container">
            <div class="delivery-info">
                <form id="orderForm">
                    <div class="form-group">
                        <label>নাম (আবশ্যিক):</label>
                        <input type="text" id="custName" required placeholder="আপনার পুরো নাম">
                    </div>
                    <div class="form-group">
                        <label>মোবাইল নম্বর (১১ সংখ্যা):</label>
                        <input type="text" id="custMobile" required maxlength="11" placeholder="যেমন: 01700000000">
                    </div>
                    <div class="form-group">
                        <label>ঠিকানা (আবশ্যিক):</label>
                        <textarea id="custAddress" required rows="4" placeholder="আপনার বিস্তারিত ঠিকানা (গ্রাম/শহর, থানা, জেলা)"></textarea>
                    </div>
                    <p><strong>পেমেন্ট মেথড:</strong> ক্যাশ অন ডেলিভারি (COD)</p>
                    <button type="submit" class="btn" style="width: 100%; font-size: 18px; padding: 15px;">অর্ডার কনফার্ম করুন</button>
                </form>
            </div>

            <div class="order-summary">
                <h3>অর্ডার সামারি</h3>
                <div id="summary-items">
                    </div>
                <div class="summary-row" style="margin-top: 20px;">
                    <span>সাব-টোটাল:</span>
                    <span id="subtotal">৳০</span>
                </div>
                <div class="summary-row">
                    <span>কুরিয়ার খরচ:</span>
                    <span id="shipping">৳৮০</span>
                </div>
                <div class="summary-row total-row">
                    <span>সর্বমোট:</span>
                    <span id="grandtotal">৳০</span>
                </div>
            </div>
        </div>
    </div>

    <script src="public/secrets.js"></script>
    <script src="script.js"></script>
    <script src="save-order.js"></script>
</body>
</html>
