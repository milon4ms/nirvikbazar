<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Checkout - Nirvik Bazar</title>
  <link rel="stylesheet" href="styles.css" />
  <script>window.SECRETS = window.SECRETS || {};</script>
</head>
<body>
  <header class="site-header">
    <h1>Checkout</h1>
    <nav><a href="index.html">Home</a></nav>
  </header>

  <main style="max-width:700px;margin:20px auto;padding:12px;">
    <form id="checkoutForm">
      <label>নাম:<br/><input id="name" name="name" required /></label><br/><br/>
      <label>মোবাইল:<br/><input id="mobile" name="mobile" required /></label><br/><br/>
      <label>ঠিকানা:<br/><textarea id="address" name="address" required></textarea></label><br/><br/>
      <div>
        <strong>কার্ট থেকে মোট: </strong><span id="cartTotal">৳0</span>
      </div>
      <br/>
      <button type="submit">অর্ডার সম্পন্ন করুন</button>
    </form>
  </main>

  <script src="script.js"></script>
  <script src="save-order.js"></script>
  <script>
    // show cart total on page load
    document.addEventListener('DOMContentLoaded', () => {
      const totalEl = document.getElementById('cartTotal');
      totalEl.textContent = '৳' + getCartTotal();
    });

    // form submit handler uses saveOrder defined in save-order.js
    document.getElementById('checkoutForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const mobile = document.getElementById('mobile').value.trim();
      const address = document.getElementById('address').value.trim();
      const cart = getCart();

      if (!cart || cart.length === 0) { alert('কার্ট খালি আছে!'); return; }

      const orderId = 'ORD-' + Date.now();
      const total = getCartTotal();

      const orderData = { orderId, name, mobile, address, products: cart, total };

      const submitBtn = e.target.querySelector('button[type="submit"]');
      submitBtn.disabled = true;
      submitBtn.textContent = 'প্রসেস করছি...';

      try {
        const saved = await saveOrder(orderData);
        if (saved) {
          alert(`✅ অর্ডার সফল!\nঅর্ডার নম্বর: ${orderId}`);
          localStorage.removeItem('cart');
          window.location.href = 'index.html';
        } else {
          alert('অর্ডার সেভ করতে সমস্যা। পরে চেষ্টা করুন।');
          submitBtn.disabled = false;
          submitBtn.textContent = 'অর্ডার সম্পন্ন করুন';
        }
      } catch(err) {
        console.error(err);
        alert('ত্রুটি হয়েছে। কনসোলে দেখুন।');
        submitBtn.disabled = false;
        submitBtn.textContent = 'অর্ডার সম্পন্ন করুন';
      }
    });
  </script>
</body>
</html>
