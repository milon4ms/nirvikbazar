<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>চেকআউট - নির্বিক বাজার</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --primary: #00a651; --secondary: #e67e22; --dark: #333; --light: #f9f9f9; --white: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Hind Siliguri', sans-serif; }
        body { background: var(--light); padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .checkout-title { text-align: center; margin-bottom: 30px; font-size: 28px; color: var(--dark); }
        
        .checkout-flex { display: flex; flex-wrap: wrap; gap: 20px; }
        .billing-form { flex: 1; min-width: 300px; background: var(--white); padding: 25px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .order-summary { width: 350px; background: var(--white); padding: 25px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); height: fit-content; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; outline: none; }
        
        .summary-item { display: flex; justify-content: space-between; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #eee; }
        .summary-item.total { border-bottom: none; color: var(--primary); font-size: 20px; font-weight: 700; }
        
        .order-btn { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .order-btn:hover { background: #008541; }
        .order-btn:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="checkout-title">চেকআউট ফরম</h1>
        
        <form id="checkoutForm" class="checkout-flex">
            <div class="billing-form">
                <div class="form-group">
                    <label>নাম (আবশ্যক):</label>
                    <input type="text" id="name" placeholder="আপনার পুরো নাম লিখুন" required>
                </div>
                <div class="form-group">
                    <label>মোবাইল নম্বর (১১ সংখ্যা):</label>
                    <input type="tel" id="phone" placeholder="যেমন: 01700000000" pattern="[0-9]{11}" required>
                </div>
                <div class="form-group">
                    <label>ঠিকানা (আবশ্যক):</label>
                    <textarea id="address" rows="3" placeholder="বাসা নং, রোড, থানা, জেলা" required></textarea>
                </div>
                <p style="font-size: 14px; color: #444; background: #e8f5e9; padding: 10px; border-radius: 5px;">
                    <strong>পেমেন্ট মেথড:</strong> ক্যাশ অন ডেলিভারি (COD)
                </p>
            </div>

            <div class="order-summary">
                <h3 style="margin-bottom: 20px; border-bottom: 2px solid var(--primary); padding-bottom: 5px;">অর্ডার সামারি</h3>
                
                <div id="cart-items-display" style="margin-bottom: 20px;"></div>
                
                <div class="summary-item">
                    <span>সাব-টোটাল:</span>
                    <span id="subtotal">৳০</span>
                </div>
                <div class="summary-item">
                    <span>কুরিয়ার খরচ:</span>
                    <span id="shipping">৳৮০</span>
                </div>
                <div class="summary-item total">
                    <span>সর্বমোট:</span>
                    <span id="total">৳০</span>
                </div>
                
                <button type="submit" class="order-btn" id="submitBtn">অর্ডার কনফার্ম করুন</button>
                <a href="index.html" style="display:block; text-align:center; margin-top:15px; color:#666; text-decoration:none; font-size:14px;">কেনাকাটা চালিয়ে যান</a>
            </div>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // ১. কার্ট ডেটা রিড করা
            const cartData = localStorage.getItem('cart');
            const cart = cartData ? JSON.parse(cartData) : [];
            
            const itemsDisplay = document.getElementById('cart-items-display');
            const subtotalEl = document.getElementById('subtotal');
            const totalEl = document.getElementById('total');
            const submitBtn = document.getElementById('submitBtn');
            
            let subtotal = 0;
            const shippingCost = 80;

            // ২. কার্ট খালি কি না পরীক্ষা করা
            if (cart.length === 0) {
                itemsDisplay.innerHTML = '<p style="color:red; text-align:center;">আপনার কার্ট বর্তমানে খালি আছে!</p>';
                submitBtn.disabled = true;
                submitBtn.innerText = "কার্ট খালি";
            } else {
                // ৩. কার্টে পণ্য থাকলে তা লুপ করে দেখানো
                itemsDisplay.innerHTML = ''; // পরিষ্কার করা
                cart.forEach(item => {
                    // দাম সংখ্যায় রূপান্তর নিশ্চিত করা
                    const itemPrice = parseFloat(item.price) || 0;
                    const itemQty = parseInt(item.quantity) || 1;
                    const itemTotal = itemPrice * itemQty;
                    subtotal += itemTotal;
                    
                    itemsDisplay.innerHTML += `
                        <div style="display:flex; justify-content:space-between; margin-bottom:8px; border-bottom:1px dashed #ddd; padding-bottom:5px; font-size:14px;">
                            <span>${item.name} (x${itemQty})</span>
                            <span style="font-weight:600;">৳${itemTotal}</span>
                        </div>
                    `;
                });
            }

            // ৪. ক্যালকুলেশন আপডেট
            subtotalEl.innerText = '৳' + subtotal;
            totalEl.innerText = '৳' + (subtotal > 0 ? (subtotal + shippingCost) : 0);

            // ৫. অর্ডার সাবমিট (অ্যালার্ট মেসেজ)
            document.getElementById('checkoutForm').addEventListener('submit', function(e) {
                e.preventDefault();
                const name = document.getElementById('name').value;
                alert(`ধন্যবাদ ${name}! আপনার অর্ডারটি সফলভাবে গ্রহণ করা হয়েছে।`);
                localStorage.removeItem('cart'); // অর্ডার শেষে কার্ট পরিষ্কার
                window.location.href = 'index.html';
            });
        });
    </script>
</body>
</html>
