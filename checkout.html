<!DOCTYPE html>
<html lang="en">
<head>
    <!-- GitHub Secrets Injector -->
<script>
    // এটি Runtime এ GitHub Secrets inject করে
    // Production এ এটি server-side rendering এর মাধ্যমে আসবে
    
    window.SECRETS = window.SECRETS || {};
    
    // Local development এর জন্য
    if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
        console.log('ℹ️ Local development mode detected');
        // Local development এ config.js ব্যবহার করুন
    }
</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
</head>
<body>
    <h1>Checkout Page</h1>
    <form>
        <label for="name">Customer Name:</label><br>
        <input type="text" id="name" name="name" required><br><br>
        
        <label for="mobile">Mobile Number:</label><br>
        <input type="tel" id="mobile" name="mobile" required><br><br>
        
        <label for="address">Full Address:</label><br>
        <textarea id="address" name="address" required></textarea><br><br>
        
        <label>Payment Method:</label><br>
        <input type="radio" id="cod" name="payment" value="cash_on_delivery" checked>
        <label for="cod">Cash on Delivery</label><br><br>
        
        <input type="submit" value="Place Order">
    </form>
</body>
</html>
