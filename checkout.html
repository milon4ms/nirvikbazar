    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
</head>
<body>
    <h1>Checkout Page</h1>
    <form>
        <label for="name">Customer Name:</label><br>
        <input type="text" id="name" name="name" required><br><br>
        
        <label for="mobile">Mobile Number:</label><br>
        <input type="tel" id="mobile" name="mobile" required><br><br>
        
        <label for="address">Full Address:</label><br>
        <textarea id="address" name="address" required></textarea><br><br>
        
        <label>Payment Method:</label><br>
        <input type="radio" id="cod" name="payment" value="cash_on_delivery" checked>
        <label for="cod">Cash on Delivery</label><br><br>
        
        <input type="submit" value="Place Order">
    </form>
    <script>
    document.getElementById('checkoutForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const name = document.getElementById('name').value.trim();
        const mobile = document.getElementById('mobile').value.trim();
        const address = document.getElementById('address').value.trim();
        const cart = JSON.parse(localStorage.getItem('cart')) || [];
        
        // ভ্যালিডেশন
        if (cart.length === 0) {
            alert('❌ কার্ট খালি আছে!');
            return;
        }

        if (!name || name.length < 2) {
            alert('❌ সঠিক নাম দিন!');
            return;
        }

        if (!mobile || mobile.length < 10) {
            alert('❌ সঠিক মোবাইল নম্বর দিন!');
            return;
        }

        if (!address || address.length < 5) {
            alert('❌ সঠিক ঠিকানা দিন!');
            return;
        }

        const orderId = 'ORD-' + Date.now();
        const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);

        const orderData = {
            orderId,
            name,
            mobile,
            address,
            products: cart,
            total
        };

        // সাবমিট বাটন ডিসেবল করুন
        const submitBtn = e.target.querySelector('button[type="submit"]');
        submitBtn.disabled = true;
        submitBtn.textContent = 'প্রসেস করছি...';

        try {
            // অর্ডার সংরক্ষণ করুন
            const saved = await saveOrder(orderData);

            if (saved) {
                alert(`✅ আপনার অর্ডার সফল হয়েছে!\n\nঅর্ডার নম্বর: ${orderId}\n\nআমরা শীঘ্রই যোগাযোগ করব।`);
                localStorage.removeItem('cart');
                window.location.href = 'index.html';
            } else {
                alert('⚠️ অর্ডার প্রসেসিং এ সমস্যা হয়েছে। দয়া করে আবার চেষ্টা করুন।');
                submitBtn.disabled = false;
                submitBtn.textContent = 'অর্ডার সম্পন্ন করুন';
            }
        } catch(error) {
            console.error('Order error:', error);
            alert('❌ অর্ডার সংরক্ষণে ত্রুটি। দয়া করে আবার চেষ্টা করুন।');
            submitBtn.disabled = false;
            submitBtn.textContent = 'অর্ডার সম্পন্ন করুন';
        }
    });
</script>
</body>
</html>
