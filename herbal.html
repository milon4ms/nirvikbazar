<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>হারবাল পণ্য - নির্বিক বাজার</title>
    <link rel="stylesheet" href="style.css"> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* আপনার ওয়েবসাইটের সাথে সামঞ্জস্যপূর্ণ কিছু বেসিক স্টাইল */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 20px; }
        .product-card { background: #fff; border: 1px solid #ddd; padding: 15px; border-radius: 8px; text-align: center; }
        .product-card img { max-width: 100%; height: 200px; object-fit: cover; border-radius: 5px; }
        .price { color: #00a651; font-weight: bold; font-size: 18px; margin: 10px 0; }
        .add-to-cart-btn { background: #00a651; color: #fff; border: none; padding: 10px 15px; cursor: pointer; border-radius: 5px; width: 100%; }
        .add-to-cart-btn:hover { background: #008541; }
    </style>
</head>
<body>

    <header>
        </header>

    <div class="container">
        <h2 style="text-align: center; margin: 30px 0;">আমাদের হারবাল পণ্যসমূহ</h2>
        
        <div id="herbal-products" class="product-grid"></div>
    </div>

    <footer>
        </footer>

    <script src="products.js"></script>

    <script>
        // ১. শুধুমাত্র 'herbal' ক্যাটাগরির প্রডাক্ট ফিল্টার করা
        const herbalProducts = products.filter(product => product.category === 'herbal');

        // ২. প্রডাক্টগুলো পেজে প্রদর্শন করা
        function displayHerbalProducts() {
            const container = document.getElementById('herbal-products');
            
            if (herbalProducts.length === 0) {
                container.innerHTML = "<p style='text-align:center; grid-column: 1/-1;'>বর্তমানে কোনো হারবাল পণ্য নেই।</p>";
                return;
            }

            container.innerHTML = herbalProducts.map(product => `
                <div class="product-card">
                    <img src="${product.image}" alt="${product.name}">
                    <h3>${product.name}</h3>
                    <p class="price">৳${product.price}</p>
                    <button onclick="addToCart(${product.id})" class="add-to-cart-btn">
                        <i class="fas fa-shopping-cart"></i> কার্টে যোগ করুন
                    </button>
                </div>
            `).join('');
        }

        // ৩. কার্টে যোগ করার ফাংশন
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            
            const existingItem = cart.find(item => item.id === productId);
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            
            localStorage.setItem('cart', JSON.stringify(cart));
            alert(product.name + " কার্টে যোগ করা হয়েছে!");
            // যদি আপনার পেজে কার্ট কাউন্টার থাকে তবে তা এখানে আপডেট করতে পারেন
        }

        // পেজ লোড হলে রান করবে
        window.onload = displayHerbalProducts;
    </script>
</body>
</html>
