<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>নির্বিক বাজার - সেরা দামে সেরা পণ্য</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* সরাসরি সিএসএস এখানে দেওয়া হলো যাতে লোডিং সমস্যা না হয় */
        :root { --primary: #00a651; --secondary: #e67e22; --dark: #333; --light: #f9f9f9; --white: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Hind Siliguri', sans-serif; }
        body { background: var(--light); color: var(--dark); }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        /* Header */
        .main-header { background: var(--white); padding: 15px 0; border-bottom: 1px solid #ddd; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; gap: 20px; }
        .logo img { height: 50px; }
        .search-bar { flex: 1; display: flex; max-width: 500px; }
        .search-bar input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px 0 0 5px; outline: none; }
        .search-bar button { padding: 10px 15px; background: var(--primary); color: white; border: none; border-radius: 0 5px 5px 0; cursor: pointer; }
        .cart-icon { position: relative; font-size: 24px; color: var(--primary); text-decoration: none; }
        .badge { position: absolute; top: -10px; right: -10px; background: red; color: white; font-size: 12px; padding: 2px 6px; border-radius: 50%; }

        /* Nav Menu */
        .nav-menu { background: var(--primary); color: white; }
        .menu-list { list-style: none; display: flex; gap: 20px; justify-content: center; }
        .menu-list li { padding: 15px 0; position: relative; }
        .menu-list a { color: white; text-decoration: none; font-weight: 600; font-size: 15px; }
        
        .dropdown-content { display: none; position: absolute; background: white; min-width: 160px; box-shadow: 0 8px 16px rgba(0,0,0,0.2); z-index: 100; top: 100%; border-radius: 4px; }
        .dropdown:hover .dropdown-content { display: block; }
        .dropdown-content a { color: #333; padding: 12px 16px; display: block; border-bottom: 1px solid #eee; }

        /* Hero Section */
        .hero-section { background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1441986300917-64674bd600d8?ixlib=rb-1.2.1&auto=format&fit=crop&w=1200&q=80'); height: 350px; background-size: cover; background-position: center; display: flex; align-items: center; color: white; text-align: center; margin-bottom: 30px; }
        .hero-content { width: 100%; }
        .hero-content h1 { font-size: 40px; margin-bottom: 10px; }

        /* Product Grid */
        .section-title { margin: 40px 0 20px; padding-left: 10px; border-left: 5px solid var(--primary); font-size: 22px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 20px; }
        .product-card { background: var(--white); padding: 15px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; transition: 0.3s; }
        .product-card:hover { transform: translateY(-5px); }
        .product-card img { width: 100%; height: 180px; object-fit: cover; border-radius: 8px; }
        .product-card h3 { font-size: 16px; margin: 10px 0; height: 40px; overflow: hidden; }
        .price-tag { font-size: 18px; font-weight: bold; color: var(--secondary); margin-bottom: 10px; }
        
        .btn-group { display: flex; gap: 8px; margin-top: 10px; }
        .btn { flex: 1; padding: 8px; border: none; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; text-decoration: none; font-size: 14px; }
        .cart-btn { background: #27ae60; }
        .order-btn { background: var(--secondary); }

        .main-footer { background: #333; color: white; padding: 20px 0; text-align: center; margin-top: 50px; }

        @media (max-width: 768px) {
            .header-flex { flex-direction: column; text-align: center; }
            .menu-list { flex-wrap: wrap; gap: 10px; }
            .hero-content h1 { font-size: 28px; }
        }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="container header-flex">
            <div class="logo"><a href="index.html"><img src="images/logo.png" alt="Logo"></a></div>
            <div class="search-bar">
                <input type="text" placeholder="পণ্য খুঁজুন...">
                <button><i class="fa fa-search"></i></button>
            </div>
            <a href="checkout.html" class="cart-icon">
                <i class="fa fa-shopping-cart"></i>
                <span class="badge" id="cart-count">0</span>
            </a>
        </div>
    </header>

    <nav class="nav-menu">
        <div class="container">
            <ul class="menu-list">
                <li><a href="index.html">হোম</a></li>
                <li class="dropdown">
                    <a href="#">ফ্যাশন <i class="fa fa-chevron-down"></i></a>
                    <ul class="dropdown-content">
                        <li><a href="#">ম্যানস</a></li>
                        <li><a href="#">ওমেন্স</a></li>
                    </ul>
                </li>
                <li><a href="#">বেবি আইটেম</a></li>
                <li><a href="#">ন্যাচারাল প্রোডাক্ট</a></li>
                <li><a href="#">ইলেকট্রনিক্স</a></li>
            </ul>
        </div>
    </nav>

    <section class="hero-section">
        <div class="hero-content">
            <div class="container">
                <h1>সেরা দামে সেরা পণ্য</h1>
                <p>নিশ্চিত বিশুদ্ধতায় আপনার প্রতিদিনের প্রয়োজনীয় সবকিছু</p>
            </div>
        </div>
    </section>

    <div class="container">
        <h2 class="section-title">জনপ্রিয় প্রোডাক্ট</h2>
        <div id="popular-products" class="product-grid"></div>

        <h2 class="section-title">নতুন প্রোডাক্ট</h2>
        <div id="new-products" class="product-grid"></div>

        <h2 class="section-title">আমাদের পণ্যসমূহ</h2>
        <div id="product-container" class="product-grid"></div>
    </div>

    <footer class="main-footer">
        <p>&copy; ২০২৬ নির্বিক বাজার | মিলন ভাই</p>
    </footer>

    <script src="products.js"></script>
    <script src="render-products.js"></script>
    <script src="script.js"></script>
</body>
</html>
