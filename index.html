<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>নির্বিক বাজার - সেরা দামে সেরা পণ্য</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --primary: #00a651; --secondary: #e67e22; --dark: #333; --light: #f9f9f9; --white: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Hind Siliguri', sans-serif; }
        body { background: var(--light); color: var(--dark); display: flex; flex-direction: column; min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; width: 100%; }

        /* Header */
        .main-header { background: var(--white); padding: 10px 0; border-bottom: 1px solid #ddd; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; gap: 20px; }
        .logo { font-size: 22px; font-weight: 700; color: var(--primary); text-decoration: none; }
        .logo span { color: var(--secondary); }
        .search-bar { flex: 1; display: flex; max-width: 400px; }
        .search-bar input { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 5px 0 0 5px; outline: none; }
        .search-bar button { padding: 8px 12px; background: var(--primary); color: white; border: none; border-radius: 0 5px 5px 0; cursor: pointer; }
        .cart-icon { position: relative; font-size: 22px; color: var(--primary); text-decoration: none; }
        .badge { position: absolute; top: -8px; right: -10px; background: red; color: white; font-size: 10px; padding: 2px 5px; border-radius: 50%; }

        /* Menu - Left Aligned */
        .nav-menu { background: var(--primary); color: white; position: sticky; top: 0; z-index: 1000; }
        .menu-list { list-style: none; display: flex; gap: 20px; justify-content: flex-start; padding: 12px 0; }
        .menu-list a { color: white; text-decoration: none; font-weight: 600; font-size: 14px; }

        /* Hero Banner - Slim & Body Width */
        .hero-section { 
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1441986300917-64674bd600d8?auto=format&fit=crop&w=1200&q=80'); 
            height: 200px; /* উচ্চতা কমিয়ে স্লিম করা হয়েছে */
            background-size: cover; 
            background-position: center; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            color: white; 
            text-align: center; 
            border-radius: 8px;
            margin: 15px 0;
            width: 100%;
        }

        /* Products */
        .section-title { margin: 20px 0 15px; padding-left: 10px; border-left: 4px solid var(--primary); font-size: 18px; font-weight: 700; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .product-card { background: var(--white); padding: 12px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); text-align: center; border: 1px solid #eee; }
        .product-card img { width: 100%; height: 150px; object-fit: contain; border-radius: 5px; margin-bottom: 10px; }
        .product-card h3 { font-size: 14px; margin-bottom: 8px; height: 35px; overflow: hidden; }
        .price-tag { font-size: 16px; font-weight: 700; color: var(--secondary); margin-bottom: 10px; display: block; }
        
        .btn-group { display: flex; gap: 5px; }
        .btn { flex: 1; padding: 8px; border: none; border-radius: 4px; cursor: pointer; color: white; font-weight: 600; font-size: 12px; text-align: center; text-decoration: none; }
        .cart-btn { background: var(--primary); }
        .order-btn { background: var(--secondary); }

        /* Footer Fixed */
        .main-footer { background: #222; color: white; padding: 20px 0; text-align: center; margin-top: auto; border-top: 3px solid var(--primary); }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="container header-flex">
            <a href="index.html" class="logo">Nirvik <span>Bazar</span></a>
            <div class="search-bar">
                <input type="text" placeholder="পণ্য খুঁজুন...">
                <button><i class="fa fa-search"></i></button>
            </div>
            <a href="checkout.html" class="cart-icon">
                <i class="fa fa-shopping-cart"></i>
                <span class="badge" id="cart-count">0</span>
            </a>
        </div>
    </header>

    <nav class="nav-menu">
        <div class="container">
            <ul class="menu-list">
                <li><a href="index.html">হোম</a></li>
                <li><a href="#">ফ্যাশন</a></li>
                <li><a href="#">বেবি আইটেম</a></li>
                <li><a href="#">ন্যাচারাল প্রোডাক্ট</a></li>
                <li><a href="checkout.html">চেকআউট</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <section class="hero-section">
            <div class="hero-content">
                <h2 style="font-size: 24px;">সেরা দামে সেরা পণ্য</h2>
                <p style="font-size: 14px;">নিশ্চিত বিশুদ্ধতায় আপনার প্রয়োজনীয় সবকিছু</p>
            </div>
        </section>

        <h2 class="section-title">আমাদের পণ্যসমূহ</h2>
        <div id="product-list" class="product-grid"></div>
    </main>

    <footer class="main-footer">
        <div class="container">
            <p>&copy; ২০২৬ নির্বিক বাজার | মিলন ভাই</p>
            <p style="font-size: 12px; margin-top: 5px; opacity: 0.7;">আপনার কেনাকাটার বিশ্বস্ত সঙ্গী</p>
        </div>
    </footer>

    <script>
        // প্রোডাক্ট ডাটাবেজ
        const products = [
            { id: 1, name: "সুন্দরবনের খাঁটি মধু", price: 450, image: "product1.jpg" },
            { id: 2, name: "গাওয়া ঘি প্রিমিয়াম", price: 950, image: "product2.jpg" },
            { id: 3, name: "প্রিমিয়াম কটন শার্ট", price: 1250, image: "product3.jpg" },
            { id: 4, name: "স্টাইলিশ পাঞ্জাবি", price: 1800, image: "product4.jpg" },
            { id: 5, name: "কিডস সফট ড্রেস", price: 850, image: "product5.jpg" }
        ];

        function showProducts() {
            const list = document.getElementById('product-list');
            if(list) {
                list.innerHTML = products.map(p => `
                    <div class="product-card">
                        <img src="${p.image}" onerror="this.src='https://via.placeholder.com/150'" alt="${p.name}">
                        <h3>${p.name}</h3>
                        <span class="price-tag">৳${p.price}</span>
                        <div class="btn-group">
                            <button class="btn cart-btn" onclick="addToCart(${p.id})"><i class="fa fa-cart-plus"></i> কার্ট</button>
                            <button class="btn order-btn" onclick="buyNow(${p.id})">অর্ডার</button>
                        </div>
                    </div>
                `).join('');
            }
        }

        function addToCart(id) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            const p = products.find(item => item.id === id);
            if(p) {
                cart.push({ ...p, quantity: 1 });
                localStorage.setItem('cart', JSON.stringify(cart));
                updateCount();
                alert(p.name + " কার্টে যোগ হয়েছে!");
            }
        }

        function buyNow(id) {
            addToCart(id);
            window.location.href = 'checkout.html';
        }

        function updateCount() {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            const badge = document.getElementById('cart-count');
            if(badge) badge.innerText = cart.length;
        }

        window.onload = () => { showProducts(); updateCount(); };
    </script>
</body>
</html>
