<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>নির্বিক বাজার - সেরা দামে সেরা পণ্য</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --primary: #00a651; --secondary: #e67e22; --dark: #333; --light: #f9f9f9; --white: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Hind Siliguri', sans-serif; }
        body { background: var(--light); color: var(--dark); display: flex; flex-direction: column; min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; width: 100%; }

        /* Header & Nav */
        .main-header { background: var(--white); padding: 15px 0; border-bottom: 1px solid #ddd; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; gap: 20px; }
        .logo-text { font-size: 24px; font-weight: 700; color: var(--primary); text-decoration: none; }
        .logo-text span { color: var(--secondary); }
        .search-bar { flex: 1; display: flex; max-width: 500px; }
        .search-bar input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px 0 0 5px; outline: none; }
        .search-bar button { padding: 10px 15px; background: var(--primary); color: white; border: none; border-radius: 0 5px 5px 0; cursor: pointer; }
        .cart-icon { position: relative; font-size: 24px; color: var(--primary); text-decoration: none; }
        .badge { position: absolute; top: -10px; right: -10px; background: red; color: white; font-size: 12px; padding: 2px 6px; border-radius: 50%; }

        .nav-menu { background: var(--primary); color: white; }
        .menu-list { list-style: none; display: flex; gap: 20px; justify-content: center; padding: 15px 0; }
        .menu-list a { color: white; text-decoration: none; font-weight: 600; }

        /* Hero Banner - বডির সমান চওড়া */
        .hero-section { 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1441986300917-64674bd600d8?auto=format&fit=crop&w=1200&q=80'); 
            height: 300px; 
            background-size: cover; 
            background-position: center; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            color: white; 
            text-align: center; 
            margin: 20px 0;
            border-radius: 10px;
        }
        .hero-content h1 { font-size: 32px; margin-bottom: 10px; }

        /* Product Grid */
        .section-title { margin: 30px 0 15px; padding-left: 10px; border-left: 5px solid var(--primary); font-size: 20px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .product-card { background: var(--white); padding: 15px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; }
        .product-card img { width: 100%; height: 180px; object-fit: cover; border-radius: 8px; }
        .btn-group { display: flex; gap: 8px; margin-top: 15px; }
        .btn { flex: 1; padding: 8px; border: none; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; font-size: 13px; text-decoration: none; }
        .cart-btn { background: #27ae60; }
        .order-btn { background: var(--secondary); }

        /* Footer - ফিক্স করা হয়েছে */
        .main-footer { background: #333; color: white; padding: 30px 0; text-align: center; margin-top: auto; }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="container header-flex">
            <a href="index.html" class="logo-text">Nirvik <span>Bazar</span></a>
            <div class="search-bar">
                <input type="text" placeholder="পণ্য খুঁজুন...">
                <button><i class="fa fa-search"></i></button>
            </div>
            <a href="checkout.html" class="cart-icon">
                <i class="fa fa-shopping-cart"></i>
                <span class="badge" id="cart-count">0</span>
            </a>
        </div>
    </header>

    <nav class="nav-menu">
        <div class="container">
            <ul class="menu-list">
                <li><a href="index.html">হোম</a></li>
                <li><a href="#">ফ্যাশন</a></li>
                <li><a href="#">বেবি আইটেম</a></li>
                <li><a href="#">ন্যাচারাল</a></li>
                <li><a href="checkout.html">চেকআউট</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <section class="hero-section">
            <div class="hero-content">
                <h1>সেরা দামে সেরা পণ্য</h1>
                <p>নিশ্চিত বিশুদ্ধতায় আপনার প্রয়োজনীয় সবকিছু</p>
            </div>
        </section>

        <h2 class="section-title">জনপ্রিয় প্রোডাক্ট</h2>
        <div id="popular-products" class="product-grid"></div>

        <h2 class="section-title">নতুন প্রোডাক্ট</h2>
        <div id="new-products" class="product-grid"></div>

        <h2 class="section-title">আমাদের পণ্যসমূহ</h2>
        <div id="product-container" class="product-grid"></div>
    </main>

    <footer class="main-footer">
        <div class="container">
            <p>&copy; ২০২৬ নির্বিক বাজার | মিলন ভাই</p>
            <p style="font-size: 12px; color: #999; margin-top: 5px;">আপনার কেনাকাটার বিশ্বস্ত সঙ্গী</p>
        </div>
    </footer>

    <script src="products.js"></script>
    <script src="render-products.js"></script>
    <script src="script.js"></script>
</body>
</html>
