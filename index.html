<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>নির্বিক বাজার - সেরা দামে সেরা পণ্য</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --primary: #00a651; --secondary: #e67e22; --dark: #333; --light: #f4f4f4; --white: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Hind Siliguri', sans-serif; }
        body { background: var(--light); color: var(--dark); display: flex; flex-direction: column; min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 15px; width: 100%; }

        /* Header & Nav */
        .main-header { background: var(--white); padding: 15px 0; border-bottom: 1px solid #ddd; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; gap: 20px; }
        .logo { font-size: 24px; font-weight: 700; color: var(--primary); text-decoration: none; }
        .logo span { color: var(--secondary); }
        .search-bar { flex: 1; display: flex; max-width: 500px; }
        .search-bar input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px 0 0 5px; outline: none; }
        .search-bar button { padding: 10px 15px; background: var(--primary); color: white; border: none; border-radius: 0 5px 5px 0; cursor: pointer; }
        .nav-menu { background: var(--primary); color: white; position: sticky; top: 0; z-index: 1000; }
        .menu-list { list-style: none; display: flex; gap: 10px; overflow-x: auto; padding: 0; }
        .menu-list a { color: white; text-decoration: none; font-weight: 600; padding: 15px 12px; display: block; white-space: nowrap; }

        /* Product Grid */
        .section-title { margin: 30px 0 15px; padding-left: 10px; border-left: 5px solid var(--primary); font-size: 20px; font-weight: bold; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .product-card { background: var(--white); padding: 15px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.05); text-align: center; border: 1px solid #eee; }
        .product-card img { width: 100%; height: 180px; object-fit: contain; border-radius: 8px; margin-bottom: 10px; }
        .price-tag { font-size: 18px; font-weight: bold; color: var(--secondary); margin-bottom: 15px; display: block; }
        .btn-group { display: flex; gap: 8px; }
        .btn { flex: 1; padding: 10px; border: none; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; font-size: 13px; }
        .cart-btn { background: var(--primary); }
        .order-btn { background: var(--secondary); }
        .badge { position: absolute; top: -10px; right: -10px; background: red; color: white; font-size: 11px; padding: 2px 6px; border-radius: 50%; }
        .cart-icon { position: relative; font-size: 24px; color: var(--primary); text-decoration: none; }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="container header-flex">
            <a href="index.html" class="logo">Nirvik <span>Bazar</span></a>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="পণ্য খুঁজুন..." onkeyup="searchProduct()">
                <button><i class="fa fa-search"></i></button>
            </div>
            <a href="checkout.html" class="cart-icon">
                <i class="fa fa-shopping-cart"></i>
                <span class="badge" id="cart-count">0</span>
            </a>
        </div>
    </header>

    <nav class="nav-menu">
        <div class="container">
            <ul class="menu-list">
                <li><a href="index.html">হোম</a></li>
                <li><a href="mens.html">পুরুষের কাপড়</a></li>
                <li><a href="womens.html">মহিলাদের কাপড়</a></li>
                <li><a href="baby.html">শিশুদের পন্য</a></li>
                <li><a href="electronics.html">ইলেক্ট্রনিক্স</a></li>
                <li><a href="herbal.html">হারবাল পন্য</a></li>
                <li><a href="others.html">অন্যান্য পন্য</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <h2 class="section-title">আমাদের পণ্যসমূহ</h2>
        <div id="product-list" class="product-grid">লোড হচ্ছে...</div>
    </main>

    <script src="products.js"></script>

    <script>
        // যদি products.js লোড না হয়, তবে এই নিচের ডাটা কাজ করবে (Fallback)
        if (typeof products === 'undefined') {
            var products = [
                { id: 1, name: "চুলকানির যম নিমতেল", price: 501, category: "herbal", image: "images/product1.jpg" },
                { id: 2, name: "নির্ভীক পাইলস কেয়ার", price: 680, category: "herbal", image: "images/product2.jpg" },
                { id: 5, name: "কাতুয়া-Katua", price: 700, category: "mens", image: "images/product5.jpg" }
            ];
            console.warn("External products.js not found. Using internal fallback data.");
        }

        function renderProducts(data) {
            const list = document.getElementById('product-list');
            if (!list) return;
            
            list.innerHTML = data.map(p => `
                <div class="product-card">
                    <img src="${p.image}" onerror="this.src='https://via.placeholder.com/200x180?text=No+Image'" alt="${p.name}">
                    <h3>${p.name}</h3>
                    <span class="price-tag">৳${p.price}</span>
                    <div class="btn-group">
                        <button class="btn cart-btn" onclick="addToCart(${p.id})">কার্ট</button>
                        <button class="btn order-btn" onclick="buyNow(${p.id})">অর্ডার</button>
                    </div>
                </div>
            `).join('');
        }

        function searchProduct() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = products.filter(p => p.name.toLowerCase().includes(term));
            renderProducts(filtered);
        }

        function addToCart(id) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            const p = products.find(i => i.id === id);
            if (p) {
                const existing = cart.find(i => i.id === id);
                if(existing) existing.quantity += 1;
                else cart.push({...p, quantity: 1});
                localStorage.setItem('cart', JSON.stringify(cart));
                updateCartCount();
                alert(p.name + " কার্টে যোগ হয়েছে!");
            }
        }

        function buyNow(id) {
            addToCart(id);
            window.location.href = 'checkout.html';
        }

        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            document.getElementById('cart-count').innerText = cart.reduce((s, i) => s + i.quantity, 0);
        }

        window.onload = () => {
            renderProducts(products);
            updateCartCount();
        };
    </script>
</body>
</html>
