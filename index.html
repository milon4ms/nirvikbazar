<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>নির্বিক বাজার - সেরা দামে সেরা পণ্য</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --primary: #00a651; --secondary: #e67e22; --dark: #333; --light: #f9f9f9; --white: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Hind Siliguri', sans-serif; }
        body { background: var(--light); color: var(--dark); display: flex; flex-direction: column; min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; width: 100%; }

        /* Header & Search */
        .main-header { background: var(--white); padding: 15px 0; border-bottom: 1px solid #ddd; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; gap: 20px; }
        .logo-text { font-size: 24px; font-weight: 700; color: var(--primary); text-decoration: none; }
        .logo-text span { color: var(--secondary); }
        .search-bar { flex: 1; display: flex; max-width: 500px; }
        .search-bar input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px 0 0 5px; outline: none; }
        .search-bar button { padding: 10px 15px; background: var(--primary); color: white; border: none; border-radius: 0 5px 5px 0; cursor: pointer; }
        .cart-icon { position: relative; font-size: 24px; color: var(--primary); text-decoration: none; }
        .badge { position: absolute; top: -10px; right: -10px; background: red; color: white; font-size: 11px; padding: 2px 6px; border-radius: 50%; }

        /* Navigation - Left Aligned */
        .nav-menu { background: var(--primary); color: white; position: sticky; top: 0; z-index: 1000; }
        .menu-list { list-style: none; display: flex; gap: 20px; justify-content: flex-start; padding: 15px 0; }
        .menu-list a { color: white; text-decoration: none; font-weight: 600; font-size: 14px; }

        /* Hero Banner - Full Body Width */
        .hero-section { 
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1441986300917-64674bd600d8?auto=format&fit=crop&w=1200&q=80'); 
            height: 350px; 
            background-size: cover; 
            background-position: center; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            color: white; 
            text-align: center; 
            border-radius: 10px;
            margin: 20px 0;
            width: 100%;
        }

        /* Product Grid */
        .section-title { margin: 30px 0 15px; padding-left: 10px; border-left: 5px solid var(--primary); font-size: 18px; font-weight: bold; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .product-card { background: var(--white); padding: 15px; border-radius: 10px; box-shadow: 0 3px 6px rgba(0,0,0,0.05); text-align: center; }
        .product-card img { width: 100%; height: 180px; object-fit: cover; border-radius: 8px; }
        .price-tag { font-size: 18px; font-weight: bold; color: var(--secondary); margin: 10px 0; display: block; }
        
        .btn-group { display: flex; gap: 8px; }
        .btn { flex: 1; padding: 10px; border: none; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; text-decoration: none; font-size: 14px; text-align: center; }
        .cart-btn { background: var(--primary); }
        .order-btn { background: var(--secondary); }

        /* Footer */
        .main-footer { background: #222; color: white; padding: 30px 0; text-align: center; margin-top: auto; }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="container header-flex">
            <a href="index.html" class="logo-text">Nirvik <span>Bazar</span></a>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="পণ্য খুঁজুন...">
                <button onclick="searchProduct()"><i class="fa fa-search"></i></button>
            </div>
            <a href="checkout.html" class="cart-icon">
                <i class="fa fa-shopping-cart"></i>
                <span class="badge" id="cart-count">0</span>
            </a>
        </div>
    </header>

    <nav class="nav-menu">
        <div class="container">
            <ul class="menu-list">
                <li><a href="index.html">হোম</a></li>
                <li><a href="#">ফ্যাশন</a></li>
                <li><a href="#">বেবি আইটেম</a></li>
                <li><a href="#">ন্যাচারাল প্রোডাক্ট</a></li>
                <li><a href="checkout.html">চেকআউট</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <section class="hero-section">
            <div class="hero-content">
                <h1 style="font-size: 32px;">সেরা দামে সেরা পণ্য</h1>
                <p>নিশ্চিত বিশুদ্ধতায় আপনার প্রয়োজনীয় সবকিছু</p>
            </div>
        </section>

        <h2 class="section-title">জনপ্রিয় প্রোডাক্ট</h2>
        <div id="product-list" class="product-grid"></div>
    </main>

    <footer class="main-footer">
        <div class="container">
            <p>&copy; ২০২৬ নির্বিক বাজার | মিলন ভাই</p>
            <p style="font-size: 12px; color: #aaa; margin-top: 5px;">আপনার কেনাকাটার বিশ্বস্ত সঙ্গী</p>
        </div>
    </footer>

    <script>
        // প্রোডাক্ট ডাটা (দাম সংখ্যা হিসেবে রাখা হয়েছে)
        const products = [
            { id: 1, name: "সুন্দরবনের খাঁটি মধু", price: 450, image: "product1.jpg" },
            { id: 2, name: "গাওয়া ঘি", price: 950, image: "product2.jpg" },
            { id: 3, name: "প্রিমিয়াম হেডফোন", price: 1500, image: "product3.jpg" }
        ];

        function displayProducts() {
            const list = document.getElementById('product-list');
            list.innerHTML = products.map(p => `
                <div class="product-card">
                    <img src="${p.image}" alt="${p.name}">
                    <h3>${p.name}</h3>
                    <span class="price-tag">৳${p.price}</span>
                    <div class="btn-group">
                        <button class="btn cart-btn" onclick="addToCart(${p.id})">কার্ট</button>
                        <button class="btn order-btn" onclick="buyNow(${p.id})">অর্ডার</button>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(id) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            const product = products.find(p => p.id === id);
            cart.push(product);
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
            alert("পণ্য কার্টে যোগ হয়েছে!");
        }

        function buyNow(id) {
            addToCart(id);
            window.location.href = 'checkout.html';
        }

        function updateCartCount() {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            document.getElementById('cart-count').innerText = cart.length;
        }

        window.onload = () => { displayProducts(); updateCartCount(); };
    </script>
</body>
</html>
