<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>নির্বিক বাজার - সেরা দামে সেরা পণ্য</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --primary: #00a651; --secondary: #e67e22; --dark: #333; --light: #f4f4f4; --white: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Hind Siliguri', sans-serif; }
        body { background: var(--light); color: var(--dark); display: flex; flex-direction: column; min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 15px; width: 100%; }

        /* Header */
        .main-header { background: var(--white); padding: 15px 0; border-bottom: 1px solid #ddd; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; gap: 20px; }
        .logo { font-size: 24px; font-weight: 700; color: var(--primary); text-decoration: none; }
        .logo span { color: var(--secondary); }
        .search-bar { flex: 1; display: flex; max-width: 500px; }
        .search-bar input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px 0 0 5px; outline: none; }
        .search-bar button { padding: 10px 15px; background: var(--primary); color: white; border: none; border-radius: 0 5px 5px 0; cursor: pointer; }
        .cart-icon { position: relative; font-size: 24px; color: var(--primary); text-decoration: none; }
        .badge { position: absolute; top: -10px; right: -10px; background: red; color: white; font-size: 11px; padding: 2px 6px; border-radius: 50%; }

        /* Navigation with Dropdown (বাম দিকে এলাইন) */
        .nav-menu { background: var(--primary); color: white; position: sticky; top: 0; z-index: 1000; }
        .menu-list { list-style: none; display: flex; gap: 20px; justify-content: flex-start; padding: 0; }
        .menu-list > li { position: relative; padding: 15px 0; }
        .menu-list a { color: white; text-decoration: none; font-weight: 600; font-size: 14px; display: block; }
        
        /* Dropdown Styles */
        .dropdown-content { 
            display: none; position: absolute; background: white; min-width: 180px; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.1); z-index: 100; top: 100%; left: 0; 
            border-radius: 0 0 5px 5px; border-top: 3px solid var(--secondary);
        }
        .dropdown:hover .dropdown-content { display: block; }
        .dropdown-content li { list-style: none; }
        .dropdown-content a { color: #333; padding: 10px 15px; border-bottom: 1px solid #eee; font-size: 13px; }
        .dropdown-content a:hover { background: #f9f9f9; color: var(--primary); }

        /* Hero Banner */
        .hero-section { 
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1441986300917-64674bd600d8?auto=format&fit=crop&w=1200&q=80'); 
            height: 250px; background-size: cover; background-position: center; 
            display: flex; align-items: center; justify-content: center;
            color: white; text-align: center; border-radius: 10px; margin: 20px 0;
        }

        /* Product Grid */
        .section-title { margin: 30px 0 15px; padding-left: 10px; border-left: 5px solid var(--primary); font-size: 20px; font-weight: bold; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .product-card { background: var(--white); padding: 15px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.05); text-align: center; transition: 0.3s; border: 1px solid #eee; }
        .product-card img { width: 100%; height: 180px; object-fit: contain; border-radius: 8px; margin-bottom: 10px; cursor: pointer; }
        .product-card h3 { font-size: 16px; margin-bottom: 10px; height: 45px; overflow: hidden; }
        .price-tag { font-size: 18px; font-weight: bold; color: var(--secondary); margin-bottom: 15px; display: block; }
        
        .btn-group { display: flex; gap: 8px; }
        .btn { flex: 1; padding: 10px; border: none; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; text-decoration: none; text-align: center; font-size: 13px; }
        .cart-btn { background: var(--primary); }
        .order-btn { background: var(--secondary); }

        /* Footer */
        .main-footer { background: #222; color: white; padding: 40px 0 20px; margin-top: auto; border-top: 4px solid var(--primary); }
        .footer-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 30px; }
        .footer-col h4 { margin-bottom: 20px; color: var(--primary); }
