<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>পণ্যের বিবরণ - নির্বিক বাজার</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="main-header">
        <div class="container header-flex">
            <div class="logo"><a href="index.html"><img src="images/logo.png" alt="Logo"></a></div>
            <a href="checkout.html" class="cart-icon"><i class="fa fa-shopping-cart"></i><span class="badge" id="cart-count">0</span></a>
        </div>
    </header>

    <div class="container">
        <div id="product-details-content"></div>
        <a href="index.html" style="display:block; margin:20px 0; color:var(--primary); text-decoration:none;"><i class="fa fa-arrow-left"></i> কেনাকাটা চালিয়ে যান</a>
    </div>

    <script src="products.js"></script>
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const productId = parseInt(urlParams.get('id'));
            const product = products.find(p => p.id === productId);

            if (product) {
                // গ্যালারি লজিক (product1.jpg -> product1.2.jpg, product1.3.jpg...)
                const basePath = product.image.substring(0, product.image.lastIndexOf('.'));
                const extension = product.image.substring(product.image.lastIndexOf('.'));
                
                let galleryHTML = `<div class="thumb-item active" onclick="changeImg('${product.image}', this)"><img src="${product.image}"></div>`;
                
                for(let i=2; i<=6; i++) {
                    const extraImg = `${basePath}.${i}${extension}`;
                    galleryHTML += `<div class="thumb-item" onclick="changeImg('${extraImg}', this)"><img src="${extraImg}" onerror="this.style.display='none'"></div>`;
                }

                document.getElementById('product-details-content').innerHTML = `
                    <div class="details-container">
                        <div class="details-image-side">
                            <img id="mainImg" class="main-img" src="${product.image}">
                            <div class="product-gallery">${galleryHTML}</div>
                        </div>
                        <div class="details-info-side" style="flex:1 1 400px;">
                            <h1>${product.name}</h1>
                            <div class="price-tag" style="font-size:30px;">৳${product.price}</div>
                            <p style="margin-bottom:20px; color:#666;">${product.description}</p>
                            <div class="btn-group">
                                <button onclick="addToCart(${product.id})" class="btn cart-btn">কার্টে যোগ করুন</button>
                                <button onclick="buyNow(${product.id})" class="btn order-btn">সরাসরি অর্ডার</button>
                            </div>
                        </div>
                    </div>
                `;
            }
        });

        function changeImg(src, el) {
            document.getElementById('mainImg').src = src;
            document.querySelectorAll('.thumb-item').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        }
    </script>
</body>
</html>
