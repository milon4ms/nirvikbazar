<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>পণ্যের বিস্তারিত - নির্বিক বাজার</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">

    <style>
        .details-wrapper {
            padding: 40px 0;
            min-height: 60vh;
        }
        .details-container {
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            background: #fff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }
        .details-image-side {
            flex: 1 1 400px;
            text-align: center;
        }
        .details-image-side img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            border: 1px solid #eee;
        }
        .details-info-side {
            flex: 1 1 400px;
        }
        .product-name {
            font-size: 28px;
            color: #222;
            margin-bottom: 15px;
        }
        .product-price {
            font-size: 32px;
            font-weight: bold;
            color: #e67e22;
            margin-bottom: 20px;
        }
        .product-desc-title {
            font-size: 18px;
            margin-bottom: 10px;
            border-bottom: 2px solid #004a99;
            display: inline-block;
        }
        .product-full-desc {
            color: #555;
            line-height: 1.8;
            margin-bottom: 30px;
        }
        .action-buttons {
            display: flex;
            gap: 15px;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #004a99;
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        @media (max-width: 600px) {
            .product-name { font-size: 22px; }
            .action-buttons { flex-direction: column; }
        }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="container header-flex">
            <div class="logo">
                <a href="index.html">
                    <img src="images/logo.png" alt="Nirvik Bazar Logo" style="height: 60px;">
                </a>
            </div>
            <div class="header-icons">
                <a href="checkout.html" class="cart-icon">
                    <i class="fa fa-shopping-cart"></i>
                    <span class="badge" id="cart-count">0</span>
                </a>
            </div>
        </div>
    </header>

    <div class="container details-wrapper">
        <div id="product-details-content">
            <div style="text-align:center; padding: 50px;">
                <i class="fa fa-spinner fa-spin" style="font-size: 40px; color: #004a99;"></i>
                <p>লোডিং হচ্ছে...</p>
            </div>
        </div>
        <a href="index.html" class="back-link"><i class="fa fa-arrow-left"></i> কেনাকাটা চালিয়ে যান</a>
    </div>

    <footer class="main-footer">
        <div class="container footer-bottom">
            <p>&copy; ২০২৬ নির্বিক বাজার | ডিজাইন ও ডেভেলপমেন্ট: মোঃ আসাদুজ্জামান মিলন</p>
        </div>
    </footer>

    <script src="products.js"></script>
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // ১. URL থেকে পণ্যের ID সংগ্রহ করা
            const urlParams = new URLSearchParams(window.location.search);
            const productId = parseInt(urlParams.get('id'));

            // ২. products.js থেকে ডাটা খুঁজে বের করা
            const product = products.find(p => p.id === productId);

            const displayContainer = document.getElementById('product-details-content');

            if (product) {
                // ৩. পেজের টাইটেল পরিবর্তন করা
                document.title = `${product.name} - নির্বিক বাজার`;

                // ৪. HTML ইনজেক্ট করা
                displayContainer.innerHTML = `
                    <div class="details-container">
                        <div class="details-image-side">
                            <img src="${product.image}" alt="${product.name}">
                        </div>
                        <div class="details-info-side">
                            <h1 class="product-name">${product.name}</h1>
                            <div class="product-price">৳${product.price}</div>
                            <h3 class="product-desc-title">পণ্যের বিবরণ:</h3>
                            <p class="product-full-desc">${product.description}</p>
                            
                            <div class="action-buttons">
                                <button onclick="addToCart(${product.id})" class="btn" style="padding: 15px 40px; font-size: 18px; width: 100%;">
                                    <i class="fa fa-cart-plus"></i> কার্টে যোগ করুন
                                </button>
                            </div>
                            <p style="margin-top: 20px; color: #666; font-size: 14px;">
                                <i class="fa fa-truck"></i> সারা বাংলাদেশে ক্যাশ অন ডেলিভারি পাওয়া যাবে।
                            </p>
                        </div>
                    </div>
                `;
            } else {
                displayContainer.innerHTML = `
                    <div style="text-align:center; padding: 100px 0;">
                        <i class="fa fa-exclamation-triangle" style="font-size: 50px; color: #ccc;"></i>
                        <h2>দুঃখিত! পণ্যটি পাওয়া যায়নি।</h2>
                        <a href="index.html" class="btn">হোমপেজে ফিরে যান</a>
                    </div>
                `;
            }
            
            // কার্ট কাউন্ট আপডেট করা (script.js থেকে)
            if (typeof updateCartCount === "function") {
                updateCartCount();
            }
        });
    </script>
</body>
</html>
