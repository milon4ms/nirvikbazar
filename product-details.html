<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>পণ্যের বিস্তারিত - নির্বিক বাজার</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container" style="margin-top: 50px;">
        <div id="product-details-content" class="details-flex">
            </div>
    </div>

    <script src="products.js"></script>
    <script>
        // URL থেকে পণ্যের ID খুঁজে বের করা
        const urlParams = new URLSearchParams(window.location.search);
        const productId = parseInt(urlParams.get('id'));

        // products.js থেকে ওই নির্দিষ্ট পণ্যটি খুঁজে বের করা
        const product = products.find(p => p.id === productId);

        if (product) {
            document.getElementById('product-details-content').innerHTML = `
                <div class="details-img">
                    <img src="${product.image}" alt="${product.name}" style="width:100%; border-radius:10px;">
                </div>
                <div class="details-info" style="padding: 20px;">
                    <h1>${product.name}</h1>
                    <p class="price" style="font-size: 24px; color: green;">৳${product.price}</p>
                    <hr>
                    <h3>পণ্যের বিবরণ:</h3>
                    <p>${product.description}</p>
                    <br>
                    <button onclick="addToCart(${product.id})" class="btn" style="padding:15px 30px;">কার্টে যোগ করুন</button>
                    <a href="index.html" class="btn" style="background:#666; margin-left:10px;">ফিরে যান</a>
                </div>
            `;
            document.title = product.name + " - নির্বিক বাজার";
        } else {
            document.getElementById('product-details-content').innerHTML = "<h2>দুঃখিত! পণ্যটি পাওয়া যায়নি।</h2>";
        }
    </script>
</body>
</html>
